<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLZ Inmobiliaria · Contacto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Nunito:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:       #19644d;
    --verde-osc:   #0f3d2e;
    --verde-claro: #dff0e9;
    --coral:       #fa5152;
    --coral-claro: #fff0f0;
    --coral-med:   #fc8a8b;
    --crema:       #FAF8F4;
    --gris-texto:  #2C2C2A;
    --gris-sub:    #6B6B68;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Nunito", sans-serif;
    background: var(--crema);
    color: var(--gris-texto);
    min-height: 100vh;
    padding: 32px 20px;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 500px 350px at 90% 0%, rgba(250,81,82,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 400px 300px at 10% 100%, rgba(25,100,77,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .doc {
    position: relative; z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(25,100,77,0.08);
  }

  /* HEADER */
  .header {
    background: var(--verde);
    padding: 36px 40px 30px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: "";
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(250,81,82,0.12);
    top: -60px; right: -50px;
  }
  .header::after {
    content: "";
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(250,81,82,0.08);
    bottom: -30px; left: 30px;
  }
  .header-tag {
    font-family: "DM Sans", sans-serif;
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--coral-med);
    margin-bottom: 10px; display: block;
    position: relative; z-index: 1;
  }
  .header h1 {
    font-family: "Playfair Display", serif;
    font-size: 26px; font-weight: 900;
    margin-bottom: 8px; line-height: 1.1;
    position: relative; z-index: 1;
  }
  .header p {
    font-family: "Cormorant Garamond", serif;
    font-size: 15px; font-weight: 300; font-style: italic;
    opacity: 0.7; position: relative; z-index: 1;
  }

  /* barra coral triple */
  .acento {
    height: 4px;
    background: var(--coral);
  }

  /* BODY */
  .body { padding: 32px 40px 40px; }

  /* selector tipo */
  .tipo-label {
    font-family: "DM Sans", sans-serif;
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--gris-sub);
    margin-bottom: 10px; display: block;
  }

  .tipo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 26px;
  }

  .tipo-btn {
    padding: 13px 10px;
    border-radius: 10px;
    border: 1px solid rgba(25,100,77,0.12);
    background: white;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    transition: all 0.16s ease;
    user-select: none;
  }
  .tipo-btn:hover {
    border-color: var(--coral);
    background: var(--coral-claro);
  }
  .tipo-btn.activo {
    border-color: var(--coral);
    background: var(--coral);
    color: #fff;
    box-shadow: 0 3px 12px rgba(250,81,82,0.22);
  }

  .tipo-icon { display: block; color: var(--verde); transition: color 0.16s; }
  .tipo-btn:hover .tipo-icon { color: var(--coral); }
  .tipo-btn.activo .tipo-icon { color: rgba(255,255,255,0.9); }

  .tipo-nombre {
    font-family: "DM Sans", sans-serif;
    font-size: 12.5px; font-weight: 500;
    color: var(--gris-texto); transition: color 0.16s;
  }
  .tipo-btn:hover .tipo-nombre { color: var(--coral); }
  .tipo-btn.activo .tipo-nombre { color: #fff; }

  /* separador */
  .sep { display: flex; align-items: center; gap: 14px; margin: 0 0 22px; }
  .sep-line { flex: 1; height: 1px; background: rgba(25,100,77,0.08); }
  .sep-mark { width: 5px; height: 5px; border-radius: 50%; background: var(--coral); opacity: 0.5; }

  /* campos */
  .campo { margin-bottom: 14px; }
  .campo-label {
    font-family: "DM Sans", sans-serif;
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gris-sub); display: block; margin-bottom: 6px;
  }
  .campo input,
  .campo textarea {
    width: 100%;
    font-family: "Nunito", sans-serif;
    font-size: 13.5px; color: var(--gris-texto);
    background: var(--crema);
    border: 1px solid rgba(25,100,77,0.12);
    border-radius: 9px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.16s, box-shadow 0.16s;
  }
  .campo input:focus,
  .campo textarea:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 3px rgba(250,81,82,0.07);
  }
  .campo input::placeholder,
  .campo textarea::placeholder { color: rgba(107,107,104,0.4); }
  .campo textarea { resize: none; height: 88px; line-height: 1.6; }

  .campo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  hr.divider { border: none; border-top: 1px solid rgba(25,100,77,0.07); margin: 22px 0 20px; }

  /* botón */
  .btn-enviar {
    width: 100%;
    padding: 15px 20px;
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: "DM Sans", sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-enviar:hover {
    background: #e03e3f;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(250,81,82,0.25);
  }
  .btn-enviar:active { transform: translateY(0); }

  .nota {
    margin-top: 12px; text-align: center;
    font-family: "Nunito", sans-serif;
    font-size: 10.5px; font-weight: 300;
    color: var(--gris-sub); opacity: 0.45; line-height: 1.5;
  }

  /* footer */
  .footer-doc {
    text-align: center;
    padding: 14px;
    font-family: "Cormorant Garamond", serif;
    font-size: 12px; font-style: italic; font-weight: 300;
    color: var(--gris-sub); opacity: 0.35;
    border-top: 1px solid rgba(25,100,77,0.06);
  }
  .footer-back {
    display: inline-block;
    margin-bottom: 6px;
    font-family: "DM Sans", sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gris-sub); text-decoration: none;
    opacity: 0.35; transition: opacity 0.15s;
  }
  .footer-back:hover { opacity: 0.8; color: var(--verde); }
</style>
</head>
<body>
<div class="doc">

  <div class="header">
    <span class="header-tag">NLZ Inmobiliaria · CPI 6518</span>
    <h1>¿En qué te puedo<br>ayudar?</h1>
    <p>Contame tu situación y te respondo<br>a la brevedad.</p>
  </div>
  <div class="acento"></div>

  <div class="body">

    <span class="tipo-label">Tipo de consulta</span>
    <div class="tipo-grid">

      <button class="tipo-btn" data-tipo="Quiero comprar" onclick="selTipo(this)">
        <svg class="tipo-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 9L11 2.5L19.5 9V19H14V14H8V19H2.5V9Z"/>
          <rect x="8.5" y="8" width="3" height="3" rx="0.5" stroke-width="1"/>
        </svg>
        <span class="tipo-nombre">Comprar</span>
      </button>

      <button class="tipo-btn" data-tipo="Quiero vender" onclick="selTipo(this)">
        <svg class="tipo-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7.5" cy="8.5" r="4.5"/>
          <circle cx="7.5" cy="8.5" r="1.8" stroke-width="1"/>
          <path d="M11 12L19.5 20.5" stroke-width="1.3"/>
          <path d="M15.5 17L17.5 15" stroke-width="1.2"/>
          <path d="M17.8 19.2L19.8 17.2" stroke-width="1.2"/>
        </svg>
        <span class="tipo-nombre">Vender</span>
      </button>

      <button class="tipo-btn" data-tipo="Alquiler temporario" onclick="selTipo(this)">
        <svg class="tipo-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="16" cy="5.5" r="2"/>
          <line x1="16" y1="2" x2="16" y2="2.8"/>
          <line x1="18.8" y1="2.8" x2="18.2" y2="3.4"/>
          <line x1="19.5" y1="5.5" x2="18.7" y2="5.5"/>
          <path d="M5 11 Q8 7.5 11 11 Q14 7.5 17 11"/>
          <line x1="11" y1="11" x2="11" y2="18"/>
          <path d="M9.2 18 Q11 16.2 12.8 18"/>
          <path d="M2 15.5 Q4 14 6 15.5 Q8 17 10 15.5"/>
          <path d="M2 19 Q4.5 17.5 7 19 Q9.5 20.5 12 19"/>
        </svg>
        <span class="tipo-nombre">Alquiler temporario</span>
      </button>

      <button class="tipo-btn" data-tipo="Necesito una tasación" onclick="selTipo(this)">
        <svg class="tipo-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20C5.48 20 2 15.52 2 11C2 6.48 6.48 2 11 2C14.9 2 18.12 4.65 19.1 8.28" stroke-width="1.2"/>
          <path d="M19.1 8.28C19.65 10.32 19.1 12.68 17.6 14.3" stroke-width="1.2"/>
          <path d="M17.6 14.3C16.15 15.87 13.9 16.65 11.7 16.35" stroke-width="1.2"/>
          <path d="M11.7 16.35C9.7 16.05 8.1 14.55 7.65 12.6" stroke-width="1.2"/>
          <path d="M7.65 12.6C7.25 11.05 7.9 9.35 9.1 8.35" stroke-width="1.2"/>
          <circle cx="11" cy="11" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="tipo-nombre">Tasación</span>
      </button>

    </div>

    <div id="paso2" style="overflow:hidden; max-height:0; opacity:0; transition: max-height 0.5s ease, opacity 0.4s ease 0.1s;">

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-mark"></div>
      <div class="sep-line"></div>
    </div>

    <div class="campo">
      <label class="campo-label">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo">
    </div>

    <div class="campo">
      <label class="campo-label">Teléfono / WhatsApp</label>
      <input type="tel" id="telefono" placeholder="351 000 0000">
    </div>

    <div class="campo">
      <label class="campo-label">Zona o barrio</label>
      <input type="text" id="zona" placeholder="Ej: Nueva Córdoba, Güemes, Villa Allende...">
    </div>

    <div class="campo">
      <label class="campo-label">Contame más</label>
      <textarea id="consulta" placeholder="Presupuesto, tamaño, características importantes, urgencia..."></textarea>
    </div>

    <hr class="divider">

    <button class="btn-enviar" onclick="enviarWA()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.529 5.857L0 24l6.335-1.521A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.794 9.794 0 01-5.034-1.389l-.361-.214-3.741.899.947-3.638-.235-.374A9.763 9.763 0 012.182 12C2.182 6.579 6.579 2.182 12 2.182S21.818 6.579 21.818 12 17.421 21.818 12 21.818z"/>
      </svg>
      Enviar consulta
    </button>

    <p class="nota">Tu consulta se abrirá directamente en WhatsApp.<br>No almacenamos tus datos.</p>

    </div>

  </div>

  <div class="footer-doc">
    <a href="/links" class="footer-back">← Volver</a><br>
    NLZ Inmobiliaria · Natalia Luque · Córdoba
  </div>

</div>

<script>
var tipoSeleccionado = '';
function selTipo(btn) {
  document.querySelectorAll('.tipo-btn').forEach(function(b) { b.classList.remove('activo'); });
  btn.classList.add('activo');
  tipoSeleccionado = btn.getAttribute('data-tipo');
  var paso2 = document.getElementById('paso2');
  paso2.style.maxHeight = '600px';
  paso2.style.opacity = '1';
  setTimeout(function() {
    paso2.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 120);
}
function enviarWA() {
  var nombre   = document.getElementById('nombre').value.trim();
  var telefono = document.getElementById('telefono').value.trim();
  var zona     = document.getElementById('zona').value.trim();
  var consulta = document.getElementById('consulta').value.trim();
  if (!tipoSeleccionado) { alert('Por favor seleccioná el tipo de consulta.'); return; }
  if (!nombre) { alert('Por favor ingresá tu nombre.'); return; }
  var msg = '🏡 *Consulta NLZ Inmobiliaria*\n\n'
    + '*Tipo:* ' + tipoSeleccionado + '\n'
    + '*Nombre:* ' + nombre + '\n'
    + (telefono ? '*Teléfono:* ' + telefono + '\n' : '')
    + (zona     ? '*Zona:* ' + zona + '\n' : '')
    + (consulta ? '\n*Consulta:*\n' + consulta : '');
  window.open('https://wa.me/543515165220?text=' + encodeURIComponent(msg), '_blank');
}
</script>
</body>
</html>
